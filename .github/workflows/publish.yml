name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'
          # BOOTSTRAP: npm cannot configure OIDC trusted publishing for a package
          # that does not exist yet, so the very first publish authenticates with a
          # token. Once 0.2.0 is on npm and a Trusted Publisher is configured, revert
          # this token auth (registry-url here + NODE_AUTH_TOKEN below) back to OIDC.
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: 'npm ci'

      - name: Release
        run: npm run release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
